<!DOCTYPE html>
<html>
<head>
<title>Snake and Ladder Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

h1{
margin-top:20px;
}

#board{
width:500px;
height:500px;
margin:auto;
display:grid;
grid-template-columns:repeat(10,1fr);
border:3px solid black;
}

.cell{
border:1px solid gray;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
background:white;
}

.player1{
background:red;
color:white;
}

.player2{
background:blue;
color:white;
}

.controls{
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Snake and Ladder</h1>

<div id="board"></div>

<div class="controls">
<button onclick="rollDice()">Roll Dice</button>
<p id="diceResult"></p>
<p id="playerTurn">Player 1 Turn</p>
</div>

<script>

let board = document.getElementById("board")

let player1 = 1
let player2 = 1
let turn = 1

let snakes = {
16:6,
47:26,
49:11,
56:53,
62:19,
64:60,
87:24,
93:73,
95:75,
98:78
}

let ladders = {
1:38,
4:14,
9:31,
21:42,
28:84,
36:44,
51:67,
71:91,
80:100
}

function createBoard(){

for(let i=100;i>=1;i--){

let cell=document.createElement("div")
cell.classList.add("cell")
cell.id="cell"+i
cell.innerText=i

board.appendChild(cell)

}

updateBoard()

}

function updateBoard(){

document.querySelectorAll(".cell").forEach(c=>{
c.classList.remove("player1")
c.classList.remove("player2")
})

document.getElementById("cell"+player1).classList.add("player1")
document.getElementById("cell"+player2).classList.add("player2")

}

function rollDice(){

let dice = Math.floor(Math.random()*6)+1
document.getElementById("diceResult").innerText="Dice: "+dice

if(turn===1){

player1 += dice

if(snakes[player1]) player1 = snakes[player1]
if(ladders[player1]) player1 = ladders[player1]

if(player1>=100){
alert("Player 1 Wins!")
location.reload()
}

turn=2
document.getElementById("playerTurn").innerText="Player 2 Turn"

}

else{

player2 += dice

if(snakes[player2]) player2 = snakes[player2]
if(ladders[player2]) player2 = ladders[player2]

if(player2>=100){
alert("Player 2 Wins!")
location.reload()
}

turn=1
document.getElementById("playerTurn").innerText="Player 1 Turn"

}

updateBoard()

}

createBoard()

</script>

</body>
</html>
